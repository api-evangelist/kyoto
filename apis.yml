apis:
  - aid: kyoto:kurenai-oai
    name: KURENAI OAI-PMH Metadata API
    description: >-
      The Kyoto University Research Information Repository (KURENAI), built on
      DSpace, exposes an OAI-PMH 2.0 metadata harvesting endpoint for its
      bulletins, dissertations, and academic journal articles. Verified live via
      the Identify verb (repositoryName "Kyoto University Research Information
      Repository", admin email repository@mail2.adm.kyoto-u.ac.jp).
    humanURL: https://repository.kulib.kyoto-u.ac.jp/
    baseURL: https://repository.kulib.kyoto-u.ac.jp/server/oai/request
    tags: [ Repository, OAI-PMH, Metadata, Scholarly, Open Access, Research ]
    properties:
      - type: Documentation
        url: https://repository.kulib.kyoto-u.ac.jp/
      - type: OpenAPI
        url: openapi/kyoto-kurenai-oai.yaml
  - aid: kyoto:sso
    name: Kyoto University Integrated Authentication (Shibboleth/SAML)
    description: >-
      The Institute for Information Management and Communication (IIMC) operates
      a Shibboleth-based SAML identity provider for university-wide accounts
      (SPS-ID / ECS-ID) with multi-factor authentication. Federation/SP
      connections require committee approval; this is institutional SSO
      infrastructure, not a public self-service API.
    humanURL: https://www.iimc.kyoto-u.ac.jp/en/services/account/auth-system
    tags: [ Authentication, SSO, Shibboleth, SAML, Identity ]
    properties:
      - type: Documentation
        url: https://www.iimc.kyoto-u.ac.jp/en/services/account/auth-system
