---
aid: kyoto
name: Kyoto University
description: >-
  Kyoto University is a national research university in Kyoto, Japan, ranked #37
  in the QS World University Rankings 2025. Its public, machine-readable
  developer footprint is centered on scholarly and open-source infrastructure
  rather than a centralized developer portal. Confirmed public surfaces include
  the KURENAI research information repository (DSpace) with a live OAI-PMH
  metadata endpoint, the kyoto-u "Kyoto University Open Source Project" GitHub
  organization, and a Shibboleth/SAML integrated authentication system operated
  by the Institute for Information Management and Communication (IIMC). Student
  information, course, and timetable systems are gated behind campus accounts
  and are not publicly documented APIs.
