    summary: >-
      Kyoto University has no centralized developer portal. Verified live: the
      KURENAI DSpace repository OAI-PMH endpoint responds to Identify
      (repositoryName "Kyoto University Research Information Repository",
      protocolVersion 2.0), the kyoto-u GitHub organization exists with ~20
      open-source repos, and the IIMC Shibboleth/SAML integrated authentication
      system is publicly documented. The legacy /dspace-oai and /oai OAI paths
      return 200 but the canonical base is /server/oai/request. Student/course
      information systems are gated behind campus accounts; no public REST API
      docs were found. No fabrication: only endpoints probed live are recorded.
    endpoints:
